<!-- =========================================================
     MLViz — tiny vanilla-JS framework for the interactive
     concept animations. No external libraries. Theme-aware.
     ========================================================= -->
<script>
window.MLViz = (function(){
  "use strict";
  var registry = {};

  function register(name, init){ registry[name] = init; }

  // Theme-aware colour palette — call fresh each frame so widgets recolour on theme switch.
  function palette(){
    var dark = document.documentElement.getAttribute('data-theme') === 'dark';
    return {
      dark: dark,
      bg:     dark ? '#161b22' : '#ffffff',
      panel:  dark ? '#1b212b' : '#fbfaf8',
      ink:    dark ? '#e7ebf0' : '#1f2328',
      soft:   dark ? '#9aa4b2' : '#586069',
      faint:  dark ? '#3a434f' : '#cfc9be',
      grid:   dark ? '#283039' : '#ece7dd',
      axis:   dark ? '#6e7884' : '#9a9388',
      accent: dark ? '#818cf8' : '#4f46e5',
      accent2:dark ? '#c4b5fd' : '#7c3aed',
      good:   dark ? '#34d399' : '#10b981',
      warn:   dark ? '#fbbf24' : '#d97706',
      bad:    dark ? '#f87171' : '#e11d48',
      blue:   dark ? '#60a5fa' : '#2563eb',
      teal:   dark ? '#2dd4bf' : '#0d9488',
      pink:   dark ? '#f472b6' : '#db2777',
      series: dark ? ['#818cf8','#34d399','#fbbf24','#f87171','#60a5fa','#c4b5fd','#2dd4bf']
                   : ['#4f46e5','#10b981','#d97706','#e11d48','#2563eb','#7c3aed','#0d9488']
    };
  }

  // Hi-DPI canvas; you draw in CSS pixels (w x h).
  function makeCanvas(parent, w, h){
    var c = document.createElement('canvas');
    var dpr = Math.max(1, Math.min(3, window.devicePixelRatio || 1));
    c.style.width = '100%';
    c.style.maxWidth = w + 'px';
    c.style.aspectRatio = w + ' / ' + h;
    c.width = Math.round(w * dpr);
    c.height = Math.round(h * dpr);
    var ctx = c.getContext('2d');
    ctx.scale(dpr, dpr);
    parent.appendChild(c);
    // map a mouse/touch event to canvas CSS-pixel coords
    c.evtPos = function(ev){
      var r = c.getBoundingClientRect();
      var src = (ev.touches && ev.touches[0]) ? ev.touches[0] : ev;
      return { x: (src.clientX - r.left) * (w / r.width), y: (src.clientY - r.top) * (h / r.height) };
    };
    return { canvas: c, ctx: ctx, w: w, h: h };
  }

  function el(tag, attrs, kids){
    var e = document.createElement(tag);
    if(attrs) for(var k in attrs){
      if(k === 'class') e.className = attrs[k];
      else if(k === 'html') e.innerHTML = attrs[k];
      else if(k === 'style') e.setAttribute('style', attrs[k]);
      else if(k.slice(0,2) === 'on' && typeof attrs[k] === 'function') e.addEventListener(k.slice(2), attrs[k]);
      else e.setAttribute(k, attrs[k]);
    }
    if(kids != null){
      if(typeof kids === 'string' || typeof kids === 'number') e.textContent = '' + kids;
      else if(Array.isArray(kids)) kids.forEach(function(c){ if(c != null) e.appendChild(typeof c==='string'?document.createTextNode(c):c); });
      else e.appendChild(kids);
    }
    return e;
  }

  function button(label, onClick, opts){
    var b = el('button', { class: 'mlviz-btn' + (opts && opts.ghost ? ' ghost' : ''), type: 'button' }, label);
    b.addEventListener('click', onClick);
    return b;
  }

  function slider(o){
    var read = el('span', { class: 'mlviz-readout' });
    var lab  = el('span', { class: 'mlviz-slabel' }, o.label || '');
    var head = el('span', { class: 'mlviz-shead' }, [lab, read]);
    var inp  = el('input', { type: 'range', min: o.min, max: o.max, step: (o.step != null ? o.step : 1), value: o.value });
    function fmt(v){ return o.format ? o.format(v) : ('' + v); }
    read.textContent = fmt(+o.value);
    inp.addEventListener('input', function(){ var v = +inp.value; read.textContent = fmt(v); if(o.onInput) o.onInput(v); });
    var wrap = el('label', { class: 'mlviz-slider' }, [head, inp]);
    return { wrap: wrap, input: inp, get: function(){ return +inp.value; },
             set: function(v){ inp.value = v; read.textContent = fmt(+v); } };
  }

  // Standard card: title, body (canvas/readouts), controls, caption.
  function panel(node, opts){
    opts = opts || {};
    node.classList.add('mlviz');
    var card = el('div', { class: 'mlviz-card' });
    if(opts.title) card.appendChild(el('div', { class: 'mlviz-title' }, opts.title));
    var body = el('div', { class: 'mlviz-body' });
    var controls = el('div', { class: 'mlviz-controls' });
    card.appendChild(body);
    card.appendChild(controls);
    var cap = null;
    if(opts.caption){ cap = el('figcaption', { class: 'mlviz-caption', html: opts.caption }); card.appendChild(cap); }
    node.appendChild(card);
    return { root: card, body: body, controls: controls, caption: cap };
  }

  // requestAnimationFrame loop that skips drawing while scrolled off-screen.
  function loop(draw, node){
    var running = true, raf = 0;
    function frame(t){
      if(!running) return;
      var ok = true;
      if(node){ var r = node.getBoundingClientRect(); ok = (r.bottom > -80 && r.top < (window.innerHeight + 80)); }
      if(ok){ try{ draw(t || 0); }catch(e){ running = false; console.error('[MLViz] draw error', e); return; } }
      raf = requestAnimationFrame(frame);
    }
    raf = requestAnimationFrame(frame);
    return { stop: function(){ running = false; if(raf) cancelAnimationFrame(raf); },
             start: function(){ if(!running){ running = true; raf = requestAnimationFrame(frame); } } };
  }

  function onTheme(cb){ window.addEventListener('mlviz:theme', cb); }
  function clamp(v, a, b){ return v < a ? a : v > b ? b : v; }
  function lerp(a, b, t){ return a + (b - a) * t; }

  var API = { register: register, palette: palette, makeCanvas: makeCanvas, el: el,
              button: button, slider: slider, panel: panel, loop: loop,
              onTheme: onTheme, clamp: clamp, lerp: lerp };

  // Lazy-mount each [data-widget] when it first scrolls near the viewport.
  API.mountAll = function(){
    var nodes = Array.prototype.slice.call(document.querySelectorAll('[data-widget]'));
    function mount(node){
      if(node.__mounted) return;
      var fn = registry[node.dataset.widget];
      if(!fn){ return; }
      node.__mounted = true;
      try{ fn(node, API); }
      catch(err){ console.error('[MLViz] widget failed:', node.dataset.widget, err);
        node.innerHTML = '<p class="mlviz-caption">(this interactive demo could not load)</p>'; }
    }
    // Debug/verification: ?mlviz=eager mounts every widget immediately, ignoring the viewport.
    if((location.search || '').indexOf('mlviz=eager') !== -1){ nodes.forEach(mount); return; }
    if('IntersectionObserver' in window){
      var io = new IntersectionObserver(function(entries){
        entries.forEach(function(e){ if(e.isIntersecting){ io.unobserve(e.target); mount(e.target); } });
      }, { rootMargin: '200px 0px' });
      nodes.forEach(function(n){ io.observe(n); });
    } else {
      nodes.forEach(mount);
    }
  };

  return API;
})();
</script>

<!--WIDGET-SCRIPTS-->

<script>
(function(){
  "use strict";
  var root = document.documentElement;
  var content = document.getElementById('content');

  /* ---------- THEME ---------- */
  var themeBtn = document.getElementById('theme-btn');
  function setTheme(t){
    root.setAttribute('data-theme', t);
    try{ localStorage.setItem('mlc-theme', t); }catch(e){}
    var dark = (t === 'dark');
    var l = document.getElementById('hljs-light'), d = document.getElementById('hljs-dark');
    if(l) l.disabled = dark;
    if(d) d.disabled = !dark;
    if(themeBtn) themeBtn.textContent = dark ? '☀️' : '🌙';
    try{ window.dispatchEvent(new Event('mlviz:theme')); }catch(e){}
  }
  var savedTheme;
  try{ savedTheme = localStorage.getItem('mlc-theme'); }catch(e){}
  if(!savedTheme){
    savedTheme = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
  }
  setTheme(savedTheme);
  if(themeBtn) themeBtn.addEventListener('click', function(){
    setTheme(root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
  });

  /* ---------- HELPERS ---------- */
  function sectionLabel(sec){
    var id = sec.id;
    if(id === 'welcome') return '•';
    if(id === 'projects') return '★';
    var m = id.match(/(\d+)/);
    return m ? m[1] : '•';
  }
  function sectionTitle(sec){
    if(sec.dataset.title) return sec.dataset.title;
    var h = sec.querySelector('h1, h2');
    return h ? h.textContent.trim() : sec.id;
  }

  /* ---------- BUILD SIDEBAR ---------- */
  var sections = Array.prototype.slice.call(content.querySelectorAll('section.module'));
  var nav = document.getElementById('sb-nav');
  var linkById = {};
  sections.forEach(function(sec, i){
    var li = document.createElement('li');
    li.className = 'sb-item';
    li.dataset.for = sec.id;

    var subheads = Array.prototype.slice.call(sec.querySelectorAll(':scope > h3'));
    var hasSubs = subheads.length > 0;

    var a = document.createElement('a');
    a.className = 'sb-link';
    a.href = '#' + sec.id;
    a.innerHTML =
      '<span class="sb-num"><span>' + sectionLabel(sec) + '</span></span>' +
      '<span class="sb-text">' + sectionTitle(sec) + '</span>' +
      (hasSubs ? '<span class="sb-caret">▸</span>' : '');
    li.appendChild(a);
    linkById[sec.id] = { li: li, a: a, subs: {} };

    if(hasSubs){
      var ul = document.createElement('ul');
      ul.className = 'sb-sublist';
      subheads.forEach(function(h, j){
        if(!h.id) h.id = sec.id + '-s' + j;
        var sli = document.createElement('li');
        var sa = document.createElement('a');
        sa.className = 'sb-sublink';
        sa.href = '#' + h.id;
        sa.textContent = h.textContent.trim();
        sli.appendChild(sa);
        ul.appendChild(sli);
        linkById[sec.id].subs[h.id] = sa;
      });
      li.appendChild(ul);
      // caret toggles manually without navigating
      a.querySelector('.sb-caret').addEventListener('click', function(ev){
        ev.preventDefault(); ev.stopPropagation();
        li.classList.toggle('open');
      });
    }
    nav.appendChild(li);
  });

  /* ---------- PROGRESS ---------- */
  var PKEY = 'mlc-progress-v1';
  function loadProg(){ try{ return JSON.parse(localStorage.getItem(PKEY)) || {}; }catch(e){ return {}; } }
  function saveProg(p){ try{ localStorage.setItem(PKEY, JSON.stringify(p)); }catch(e){} }
  var boxes = Array.prototype.slice.call(document.querySelectorAll('.done-box'));
  var total = boxes.length;
  document.getElementById('sb-total').textContent = total;

  function refreshProgress(){
    var prog = loadProg();
    var done = 0;
    boxes.forEach(function(b){
      var on = !!prog[b.dataset.id];
      b.checked = on;
      var toggle = b.closest('.done-toggle');
      if(toggle) toggle.classList.toggle('is-done', on);
      var item = linkById[b.dataset.id];
      if(item) item.li.classList.toggle('done', on);
      if(on) done++;
    });
    var pct = total ? Math.round(done / total * 100) : 0;
    document.getElementById('sb-count').textContent = done;
    document.getElementById('sb-pct').textContent = pct + '%';
    document.getElementById('sb-bar-fill').style.width = pct + '%';
    document.getElementById('top-progress-fill').style.width = pct + '%';
    document.getElementById('pct-label').textContent = pct + '% complete';
  }
  boxes.forEach(function(b){
    b.addEventListener('change', function(){
      var prog = loadProg();
      if(b.checked) prog[b.dataset.id] = true; else delete prog[b.dataset.id];
      saveProg(prog);
      refreshProgress();
    });
  });
  refreshProgress();

  var resetBtn = document.getElementById('reset-btn');
  if(resetBtn) resetBtn.addEventListener('click', function(){
    if(confirm('Reset all your course progress? This cannot be undone.')){
      try{ localStorage.removeItem(PKEY); }catch(e){}
      refreshProgress();
    }
  });

  /* ---------- ACTIVE SECTION TRACKING ---------- */
  var crumb = document.getElementById('crumb');
  var activeId = null;
  function setActive(sec){
    if(!sec) return;
    if(sec.id !== activeId){
      activeId = sec.id;
      Object.keys(linkById).forEach(function(id){
        var it = linkById[id];
        var on = (id === sec.id);
        it.a.classList.toggle('active', on);
        it.li.classList.toggle('open', on);
      });
      var lbl = sectionLabel(sec);
      crumb.innerHTML = '<span class="crumb-kicker">' +
        (sec.id === 'welcome' ? 'Welcome' : sec.id === 'projects' ? 'Projects' : 'Module ' + lbl) +
        '</span> · ' + sectionTitle(sec);
      // ensure active sidebar link is visible
      var rect = linkById[sec.id].a.getBoundingClientRect();
      if(rect.top < 90 || rect.bottom > window.innerHeight){
        linkById[sec.id].a.scrollIntoView({block:'center'});
      }
    }
    // active subhead
    var item = linkById[sec.id];
    if(item && Object.keys(item.subs).length){
      var subs = Array.prototype.slice.call(sec.querySelectorAll(':scope > h3'));
      var curSub = null;
      subs.forEach(function(h){ if(h.getBoundingClientRect().top <= 140) curSub = h; });
      Object.keys(item.subs).forEach(function(hid){
        item.subs[hid].classList.toggle('active', curSub && hid === curSub.id);
      });
    }
  }
  var totop = document.getElementById('totop');
  var ticking = false;
  function onScroll(){
    if(ticking) return;
    ticking = true;
    requestAnimationFrame(function(){
      var cur = sections[0];
      for(var i=0;i<sections.length;i++){
        if(sections[i].getBoundingClientRect().top <= 130) cur = sections[i];
      }
      setActive(cur);
      totop.classList.toggle('show', window.scrollY > 600);
      ticking = false;
    });
  }
  window.addEventListener('scroll', onScroll, {passive:true});

  /* ---------- MOBILE NAV ---------- */
  var menuBtn = document.getElementById('menu-btn');
  var overlay = document.getElementById('overlay');
  function closeNav(){ document.body.classList.remove('nav-open'); }
  if(menuBtn) menuBtn.addEventListener('click', function(){ document.body.classList.toggle('nav-open'); });
  if(overlay) overlay.addEventListener('click', closeNav);
  nav.addEventListener('click', function(e){
    var a = e.target.closest('a.sb-link, a.sb-sublink');
    if(a && window.innerWidth <= 980) closeNav();
  });

  totop.addEventListener('click', function(){ window.scrollTo({top:0, behavior:'smooth'}); });

  /* ---------- CODE: copy buttons ---------- */
  Array.prototype.slice.call(content.querySelectorAll('pre')).forEach(function(pre){
    var wrap = document.createElement('div');
    wrap.className = 'code-wrap';
    pre.parentNode.insertBefore(wrap, pre);
    wrap.appendChild(pre);
    var btn = document.createElement('button');
    btn.className = 'copy-btn';
    btn.type = 'button';
    btn.textContent = 'Copy';
    btn.addEventListener('click', function(){
      var code = pre.innerText;
      function ok(){ btn.textContent='Copied!'; btn.classList.add('copied'); setTimeout(function(){ btn.textContent='Copy'; btn.classList.remove('copied'); },1600); }
      if(navigator.clipboard && navigator.clipboard.writeText){
        navigator.clipboard.writeText(code).then(ok, function(){ fallback(code); ok(); });
      } else { fallback(code); ok(); }
    });
    wrap.appendChild(btn);
  });
  function fallback(text){
    var ta = document.createElement('textarea'); ta.value = text;
    ta.style.position='fixed'; ta.style.opacity='0'; document.body.appendChild(ta);
    ta.select(); try{ document.execCommand('copy'); }catch(e){} document.body.removeChild(ta);
  }

  /* ---------- SYNTAX HIGHLIGHTING ---------- */
  if(window.hljs){
    document.querySelectorAll('pre code').forEach(function(el){ try{ window.hljs.highlightElement(el); }catch(e){} });
  }

  /* ---------- MATH (after KaTeX loads) ---------- */
  function renderMath(){
    if(window.renderMathInElement){
      window.renderMathInElement(document.body, {
        delimiters: [
          {left:'$$', right:'$$', display:true},
          {left:'\\[', right:'\\]', display:true},
          {left:'\\(', right:'\\)', display:false}
        ],
        throwOnError:false,
        ignoredTags:['script','noscript','style','textarea','pre','code','option']
      });
    } else {
      setTimeout(renderMath, 120);
    }
  }
  renderMath();

  // initial active state
  onScroll();

  /* ---------- INTERACTIVE WIDGETS ---------- */
  if(window.MLViz && MLViz.mountAll) MLViz.mountAll();
})();
</script>
